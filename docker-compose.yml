# Local WordPress for developing/testing FormPay CM.
#   docker compose up -d
#   → http://localhost:8080  (finish the WP install, then activate "FormPay CM")
#
# The plugin folder is mounted live into wp-content/plugins, so edits show up
# immediately. WP_DEBUG is on so Logger output lands in the PHP error log.
services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: rootpw
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6-php8.2-apache
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
    volumes:
      - wp_data:/var/www/html
      # Mount this plugin into wp-content/plugins so it appears in the admin.
      - ./:/var/www/html/wp-content/plugins/formpay-cm

  # One-off WP-CLI runner. Doesn't start with `up` (it's behind a profile);
  # invoke explicitly:  docker compose run --rm wpcli wp <command>
  wpcli:
    image: wordpress:cli-php8.2
    profiles: ["cli"]
    user: "33:33" # www-data, matches the wordpress image's file ownership
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/formpay-cm

volumes:
  db_data:
  wp_data:
